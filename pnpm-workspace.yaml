packages:
  - "docs"
  - "packages/*"

allowBuilds:
  esbuild: false
  lefthook: true
  sharp: false

autoInstallPeers: true
injectWorkspacePackages: true
publicHoistPattern:
  - "*@biomejs/biome*"
  - "*@e18e/cli*"
  - "*@total-typescript/tsconfig*"
  - "*lefthook*"

minimumReleaseAgeExclude:
  - "idleberg/configs"
  - "@nsis/dent"
  - "@idleberg/configs"
  - astro@7.0.0-beta.4

catalog:
  commander: ^15.0.0
  vite: ^8.0.16
  vitest: ^4.1.8
