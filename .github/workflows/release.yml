name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: windows-x64
          - target: windows-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build executable
        run: |
          bun install
          bun build src/main.ts --compile --target=bun-${{ matrix.target }}-modern --outfile dent

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create zip
        run: zip "dent-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.zip" dent.exe LICENSE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dent-${{ matrix.target }}
          path: dent-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dent-*.zip
